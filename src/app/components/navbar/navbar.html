<nav class="navbar glass-panel">
  <div class="container nav-inner">
    <a routerLink="/" class="logo" (click)="closeMenu()">Nexus<span class="text-gradient">.</span></a>
    
    <div class="search-bar">
      <i class='bx bx-search'></i>
      <input type="text" placeholder="Search for gear...">
    </div>

    <ul class="nav-links" [class.open]="isMenuOpen">
      <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" (click)="closeMenu()">Discover</a></li>
      <li><a href="#" (click)="closeMenu()">Categories</a></li>
      <li><a href="#" (click)="closeMenu()">Deals</a></li>
    </ul>

    <div class="nav-actions">
      <button class="icon-btn" aria-label="User Profile">
        <i class='bx bx-user'></i>
      </button>

        <i class='bx bx-cart'></i>

      </button>
      <button class="icon-btn hamburger-btn" aria-label="Menu" (click)="toggleMenu()">
        <i class='bx' [class.bx-menu]="!isMenuOpen" [class.bx-x]="isMenuOpen"></i>
