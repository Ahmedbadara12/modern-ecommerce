<section class="hero">
  <div class="hero-bg">
    <div class="glow-orb orb-1"></div>
    <div class="glow-orb orb-2"></div>
    <div class="grid-bg"></div>
  </div>

  <div class="container hero-container">
    <div class="hero-content animate-fade-up">
      <div class="badge">v2.0 {{ 'NEW' | translate }}</div>
      <h1 class="title">{{ 'HERO_TITLE' | translate }}</h1>
      <p class="subtitle">{{ 'HERO_SUBTITLE' | translate }}</p>
      
      <div class="cta-group">
        <button class="btn-primary">
          {{ 'SHOP_COLLECTION' | translate }} <i class='bx bx-right-arrow-alt'></i>
        </button>
        <button class="btn-outline">
          <i class='bx bx-play-circle'></i> {{ 'WATCH_VIDEO' | translate }}
        </button>
      </div>
      
      <div class="stats">
        <div class="stat">
          <span class="stat-val">24h</span>
          <span class="stat-label">Fast Delivery</span>
        </div>
        <div class="stat">
          <span class="stat-val">50k+</span>
          <span class="stat-label">Happy Gamers</span>
        </div>
        <div class="stat">
          <span class="stat-val">2Yr</span>
          <span class="stat-label">Warranty</span>
        </div>
      </div>
    </div>
    
    <div class="hero-image animate-fade-up" style="animation-delay: 0.2s;">
      <div class="float-wrapper">
        <div class="floating-product glass-panel">
          <div class="product-badge">Top Rated</div>
          <img src="https://images.unsplash.com/photo-1595225476474-87563907a212?auto=format&fit=crop&w=800&q=80" alt="Premium Keyboard" class="main-img">
          <div class="product-info">
            <div>
              <h3>Apex Pro Mini</h3>
              <p>Mechanical Keyboard</p>
            </div>
            <div class="price">$179.99</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
